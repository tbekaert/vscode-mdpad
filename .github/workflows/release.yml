name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install

      - name: Create Release PR
        uses: changesets/action@v1
        with:
          title: "release: version packages"
          commit: "release: version packages"
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.version.outputs.bumped }}
      vsix: ${{ steps.package.outputs.vsix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version bump
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          PREVIOUS=$(git show HEAD~1:package.json | jq -r .version)
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.bumped == 'true'
      - uses: actions/setup-node@v4
        if: steps.version.outputs.bumped == 'true'
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
        if: steps.version.outputs.bumped == 'true'

      - name: Package extension
        if: steps.version.outputs.bumped == 'true'
        id: package
        run: |
          pnpm run publish:extension
          echo "vsix=$(ls *.vsix)" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX
        if: steps.version.outputs.bumped == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ steps.package.outputs.vsix }}

  publish-open-vsx:
    needs: package
    if: needs.package.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ needs.package.outputs.vsix }}
          skipDuplicate: true

  publish-vscode-marketplace:
    needs: package
    if: needs.package.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Publish to VS Code Marketplace
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.VSCE_PAT }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ needs.package.outputs.vsix }}
          skipDuplicate: true

  publish-github-release:
    needs: package
    if: needs.package.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Resolve version and vsix path
        id: meta
        run: |
          VERSION=$(jq -r .version package.json)
          VSIX=$(ls mdpad-*.vsix)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            $0 == "## " ver { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." > RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          VSIX: ${{ steps.meta.outputs.vsix }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG \
            "$VSIX"
